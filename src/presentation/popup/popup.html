<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Firefox-Title-Manager</title>
    <link rel="stylesheet" type="text/css" href="popup-bootstrap.css">
</head>
<body>
<form id="window-titler-form" class="popup-shell" autocomplete="off">
    <header class="popup-header">
        <div>
            <p class="popup-eyebrow">Firefox-Title-Manager</p>
            <h1>Window Label</h1>
            <p class="popup-copy">Set a quick label for the current Firefox window.</p>
        </div>
        <button type="button" id="btn-settings" class="icon-button" aria-label="Open settings" title="Open settings">
            <img alt="" src="Preferences.svg"/>
        </button>
    </header>

    <label class="input-label" for="user-window-title-input">Current window label</label>
    <input class="form-control" id="user-window-title-input" type="text" maxlength="100" autofocus placeholder="Sprint planning, Personal, Research"/>

    <div class="popup-actions">
        <input class="btn btn-primary" id="submit-btn" type="submit" value="Save label"/>
    </div>
</form>
<script async src="popup.js" type="module"></script>
</body>
</html>
